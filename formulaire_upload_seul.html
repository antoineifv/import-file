<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Import données ArcGIS</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'DM Sans', sans-serif; background: #f0f4f8; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
  .card { background: white; border-radius: 16px; padding: 2rem; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
  .card-title { font-size: 13px; font-weight: 500; color: #64748b; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .4rem; }
  .card-name { font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 1.25rem; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12px; font-weight: 500; color: #475569; margin-bottom: 5px; }
  .field input { width: 100%; padding: 9px 11px; border: 1px solid #e2e8f0; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: #1e293b; }
  .field input:focus { outline: none; border-color: #2563eb; }
  .btn { width: 100%; padding: 14px; border: none; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: all .2s; background: #2563eb; color: white; margin-top: 6px; }
  .btn:hover:not(:disabled) { background: #1d4ed8; }
  .btn:disabled { opacity: .6; cursor: not-allowed; }
  .status { margin-top: 1rem; padding: 10px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; display: none; align-items: center; gap: 8px; }
  .status.info { display: flex; background: #eff6ff; color: #1d4ed8; }
  .status.success { display: flex; background: #f0fdf4; color: #15803d; }
  .status.error { display: flex; background: #fef2f2; color: #dc2626; }
  .spinner { width: 16px; height: 16px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
  .log { margin-top: 1rem; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; font-size: 11.5px; font-family: monospace; color: #475569; max-height: 140px; overflow-y: auto; display: none; }
  .log.visible { display: block; }
  .log-line { margin-bottom: 3px; }
  .log-line::before { content: "> "; color: #94a3b8; }
  .result-box { display: none; margin-top: 1rem; padding: 12px 14px; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; }
  .result-box.visible { display: block; }
  .result-box label { display: block; font-size: 12px; font-weight: 500; color: #15803d; margin-bottom: 6px; }
  .result-row { display: flex; align-items: center; gap: 8px; }
  .result-row code { flex: 1; background: white; border: 1px solid #e2e8f0; border-radius: 6px; padding: 6px 8px; font-size: 12.5px; color: #1e293b; word-break: break-all; }
  .result-row button { padding: 6px 12px; border: none; border-radius: 6px; background: #2563eb; color: white; font-family: 'DM Sans', sans-serif; font-size: 12.5px; font-weight: 600; cursor: pointer; flex-shrink: 0; }
  .result-row button:hover { background: #1d4ed8; }
  #copy-feedback { display: none; margin-top: 6px; font-size: 12px; color: #15803d; font-weight: 500; }
</style>
</head>
<body>
<div class="card">
  <div class="card-title">ArcGIS Online</div>
  <div class="card-name">Importer et publier mes données</div>

  <div class="field">
    <label>Fichier CSV</label>
    <input type="file" id="fileInput" accept=".csv">
  </div>

  <button class="btn" id="runBtn" onclick="runAll()">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    Importer et publier
  </button>

  <div class="status" id="status"></div>
  <div class="log" id="log"></div>

  <div class="result-box" id="result-box">
    <label>ID de la couche publiée</label>
    <div class="result-row">
      <code id="item-id-value"></code>
      <button type="button" id="copy-btn" onclick="copyItemId()">Copier</button>
    </div>
    <span id="copy-feedback">Copié !</span>
  </div>
</div>

<script>
// ── Configuration ────────────────────────────────────────────────────
const PROXY_URL = "https://project-geys4.vercel.app/api/agol-proxy";
const USERNAME   = "STAGE_IFV";
// ────────────────────────────────────────────────────────────────────────

function addLog(msg) {
  const log = document.getElementById("log");
  log.classList.add("visible");
  const line = document.createElement("div");
  line.className = "log-line";
  line.textContent = msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}

function setStatus(type, icon, msg) {
  const s = document.getElementById("status");
  s.className = "status " + type;
  s.innerHTML = icon + `<span>${msg}</span>`;
}

function copyItemId() {
  const itemId = document.getElementById("item-id-value").textContent;
  navigator.clipboard.writeText(itemId).then(() => {
    const feedback = document.getElementById("copy-feedback");
    feedback.style.display = "inline";
    setTimeout(() => { feedback.style.display = "none"; }, 2000);
  }).catch(() => {
    alert("Impossible de copier automatiquement. ID : " + itemId);
  });
}

async function callProxy(action, payload) {
  const resp = await fetch(PROXY_URL, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ action, ...payload })
  });
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  return data;
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function runAll() {
  const btn = document.getElementById("runBtn");
  const file = document.getElementById("fileInput").files[0];

  if (!file) { alert("Choisissez un fichier CSV"); return; }

  btn.disabled = true;
  btn.innerHTML = `<div class="spinner"></div> Traitement en cours…`;
  document.getElementById("log").innerHTML = "";
  document.getElementById("log").classList.remove("visible");
  document.getElementById("result-box").classList.remove("visible");
  setStatus("info", `<div class="spinner"></div>`, "Préparation du fichier…");

  try {
    addLog("Lecture et conversion du fichier…");
    const text = await file.text();
    const csvCorrige = text.replace(/;/g, ",");
    const blob = new Blob([csvCorrige], { type: "text/csv" });
    const fileContent = await fileToBase64(blob);
    const fileName = "upload_" + Date.now() + ".csv";

    setStatus("info", `<div class="spinner"></div>`, "Upload du fichier…");
    addLog("Upload vers AGOL…");
    const uploadResult = await callProxy("upload", { username: USERNAME, fileName, fileContent });
    const rawItemId = uploadResult.id;
    addLog("Fichier uploadé ✓ (id: " + rawItemId.substring(0,8) + "…)");

    setStatus("info", `<div class="spinner"></div>`, "Analyse de la structure…");
    addLog("Analyse du CSV…");
    const analyzeResult = await callProxy("analyze", { itemId: rawItemId, csvText: csvCorrige });
    addLog("Structure détectée ✓");

    setStatus("info", `<div class="spinner"></div>`, "Publication de la couche…");
    addLog("Publication en Feature Layer…");
    const publishResult = await callProxy("publish", {
      username: USERNAME,
      itemId: rawItemId,
      publishParameters: analyzeResult.publishParameters
    });
    console.log("Réponse publish reçue :", publishResult);
    const layerItemId = publishResult.services[0].serviceItemId;
    addLog("Couche publiée ✓ (id: " + layerItemId.substring(0,8) + "…)");

    document.getElementById("item-id-value").textContent = layerItemId;
    document.getElementById("result-box").classList.add("visible");

    setStatus("success", `<div class="dot"></div>`, "Import terminé — couche publiée ✓");
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Terminé`;

    setTimeout(() => {
      btn.disabled = false;
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Importer et publier`;
    }, 4000);

  } catch (err) {
    addLog("Erreur : " + err.message);
    setStatus("error", `<div class="dot"></div>`, err.message);
    btn.disabled = false;
    btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg> Relancer`;
  }
}
</script>
</body>
</html>
